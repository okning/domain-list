<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Domain List</title>
    <style>
      :root {
        --text: #1b2330;
        --muted: #5b6878;
        --primary: #0b66c3;
        --primary-soft: #e6f1ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 28px 20px;
        font-family: "Avenir Next", "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 10% 0%, #ffffff 0%, #f3f5f7 45%),
          radial-gradient(circle at 100% 100%, #eef5ff 0%, #f3f5f7 40%);
      }

      main {
        max-width: 760px;
        margin: 0 auto;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.5rem, 2.8vw, 2.1rem);
        letter-spacing: 0.01em;
      }

      p {
        margin: 14px 0 0;
        line-height: 1.7;
        color: var(--muted);
      }

      h2 {
        margin: 26px 0 10px;
        font-size: 1.05rem;
      }

      ul {
        margin: 0;
        padding-left: 18px;
      }

      li + li {
        margin-top: 8px;
      }

      a {
        color: var(--primary);
        text-decoration-color: color-mix(in oklab, var(--primary) 55%, transparent);
        text-underline-offset: 3px;
        word-break: break-all;
      }

      a:hover {
        text-decoration-color: var(--primary);
      }

      .code {
        display: inline-block;
        margin-top: 8px;
        background: var(--primary-soft);
        color: #004a94;
        border-radius: 8px;
        padding: 5px 9px;
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 0.92rem;
      }

      @media (max-width: 640px) {
        body {
          padding: 18px 14px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>Domain List</h1>
        <p>
          A list of domains for Surge and Clash, generated from
          <a href="https://github.com/v2fly/domain-list-community">v2fly/domain-list-community</a>.
        </p>

        <h2>Usage</h2>
        <ul>
          <li><span class="code">https://s.nosec.me/surge/{name}.txt</span></li>
          <li><span class="code">https://s.nosec.me/clash/{name}.txt</span></li>
        </ul>

        <h2>Examples</h2>
        <ul>
          <li>
            <a href="https://s.nosec.me/surge/github.txt">https://s.nosec.me/surge/github.txt</a>
          </li>
          <li>
            <a href="https://s.nosec.me/clash/github.txt">https://s.nosec.me/clash/github.txt</a>
          </li>
        </ul>
      </section>
    </main>
  </body>
</html>
